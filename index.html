<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <div class="gallery" id="galleryContainer">
        <img src="etagrupadlyakrytih.jpg" alt="Photo 1" class="site-image">
        <img src="kek.jpg" alt="Photo 2" class="site-image">
        <img src="shmal.jpg" alt="Photo 3" class="site-image">
        <img src="chechne.jpg" alt="Photo 4" class="site-image">
        <img src="real.jpg" alt="Photo 5" class="site-image">
        <img src="sous.jpg" alt="Photo 6" class="site-image">
        <img src="efesu.jpg" alt="Photo 7" class="site-image">
        <img src="lawfa.jpg" alt="Photo 8" class="site-image">
        <img src="rfr.jpg" alt="Photo 9" class="site-image">
        <img src="smash.jpg" alt="Photo 10" class="site-image">
        <img src="youngersmash.jpg" alt="Photo 11" class="site-image">
    </div>
    
    <div class="supernatural-text">
        Я СМОТРЮ СВЕРХЬЕСТЕСТВЕННОЕ И ЗНАЮ КАК ИЗГОНЯТЬ НЕЧИСТЬ! СМОТРИТЕ СВЕРХЬЕСТЕСТВЕННОЕ ИНАЧЕ У ВАС БУДУТ ПРОСИТЬ 2КГ ЖАРЕННОЙ КАРТОШКИ
    </div>

    <div class="forum-section">
        <input type="text" id="usernameInput" placeholder="Your Nickname">
        
        <div class="avatar-selection">
            <span style="color:#aaa; font-size:14px; display:block; margin-bottom:5px;">Choose Avatar:</span>
            <select id="avatarInput">
                <option value="etagrupadlyakrytih.jpg">Avatar 1</option>
                <option value="kek.jpg">Avatar 2</option>
                <option value="shmal.jpg">Avatar 3</option>
                <option value="chechne.jpg">Avatar 4</option>
                <option value="real.jpg">Avatar 5</option>
                <option value="sous.jpg">Avatar 6</option>
                <option value="efesu.jpg">Avatar 7</option>
                <option value="lawfa.jpg">Avatar 8</option>
                <option value="rfr.jpg">Avatar 9</option>
                <option value="smash.jpg">Avatar 10</option>
                <option value="youngersmash.jpg">Avatar 11</option>
            </select>
        </div>

        <textarea id="messageInput" placeholder="Type your message here..."></textarea>
        <button onclick="sendMessage()">Send to Forum</button>
    </div>
    
    <div id="forumMessages"></div>

    <script src="script.js"></script>
</body>
</html>
